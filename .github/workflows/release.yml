name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Verify tag matches gem version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GEM_VERSION="$(ruby -e 'require "./lib/kml/path/version"; puts Kml::Path::VERSION')"
          if [ "$TAG_VERSION" != "$GEM_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match gem version ($GEM_VERSION)"
            exit 1
          fi

      - name: Build gem
        run: gem build kml-path-parser.gemspec

      - name: Publish to RubyGems
        if: env.RUBYGEMS_API_KEY != ''
        run: gem push kml-path-parser-*.gem
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

      - name: Missing RubyGems credentials
        if: env.RUBYGEMS_API_KEY == ''
        run: |
          echo "::error::RUBYGEMS_API_KEY is not configured for this repository."
          echo "Create an API key at https://rubygems.org/profile/api_keys and add it as a repository secret."
          exit 1
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
